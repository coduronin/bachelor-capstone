{% extends "base.html" %}

{% block title %}Edit Post - VulnBlog{% endblock %}

{% block container_class %}container-wide{% endblock %}

{% block content %}
<div class="form-container">
    <h2 style="font-weight:700; color:#4f46e5; margin-bottom:1.5rem;">Edit Post</h2>
    <form method="POST" action="{{ url_for('edit_post', post_id=post._id) }}" class="form-grid">
        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" name="title" value="{{ post.title }}" required>
        </div>
        <div class="form-group">
            <label for="category">Category</label>
            <input type="text" id="category" name="category" value="{{ post.category }}" required>
        </div>
        <div class="form-group full-width">
            <label for="content">Content</label>
            <textarea id="content" name="content" rows="15" required
                style="font-family: monospace; font-size: 1rem;">{{ post.content }}</textarea>
        </div>
        <div class="form-actions full-width">
            <button type="submit" class="btn">Update Post</button>
        </div>
    </form>
</div>
{% endblock %}
